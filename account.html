<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account - Vintage Collections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --primary: #d5572a;
        --primary-dark: #b8451f;
        --dark: #2c2624;
        --light: #fdf8f3;
        --border: #f0e2d3;
        --muted: #8a7d74;
        --gold: #e3a23a;
        --success: #2f6f4f;
        --danger: #c0392b;
      }
      body {
        font-family: "Work Sans", sans-serif;
        background: var(--light);
        color: var(--dark);
        min-height: 100vh;
      }

      /* NAV */
      .nav-bar {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-content {
        max-width: 1280px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .avatar-wrap {
        cursor: pointer;
      }
      .avatar-wrap:hover .avatar-badge {
        background: var(--primary);
        transform: scale(1.1);
      }
      .avatar-badge {
        transition: all 200ms;
      }
      .logo {
        font-family: "Fraunces", serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--dark);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .logo svg {
        color: var(--primary);
      }
      .nav-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dark);
        padding: 8px;
        border-radius: 8px;
        transition: all 200ms;
        position: relative;
      }
      .icon-btn:hover {
        background: #fdf3ee;
        color: var(--primary);
      }
      .cart-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        background: var(--primary);
        color: white;
        border-radius: 50%;
        width: 17px;
        height: 17px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }
      .signout-btn {
        padding: 8px 16px;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        background: white;
        font-family: "Work Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 200ms;
      }
      .signout-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      /* LOADING SCREEN */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: var(--light);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 999;
      }
      .loading-logo {
        font-family: "Fraunces", serif;
        font-size: 18px;
        font-weight: 600;
        color: var(--dark);
        opacity: 0.5;
      }
      .loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ACCOUNT LAYOUT */
      .account-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px 64px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 28px;
        align-items: start;
      }

      /* SIDEBAR */
      .account-sidebar {
        background: white;
        border-radius: 16px;
        border: 1px solid var(--border);
        overflow: hidden;
        position: sticky;
        top: 88px;
      }
      .profile-summary {
        padding: 24px;
        border-bottom: 1px solid var(--border);
        text-align: center;
      }
      .avatar-wrap {
        position: relative;
        display: inline-block;
        margin-bottom: 14px;
      }
      .avatar-initials {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--gold));
        color: white;
        font-family: "Fraunces", serif;
        font-size: 24px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(213, 87, 42, 0.2);
      }
      .avatar-badge {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 20px;
        height: 20px;
        background: var(--success);
        border-radius: 50%;
        border: 2px solid white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .profile-name {
        font-family: "Fraunces", serif;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .profile-email {
        font-size: 12px;
        color: var(--muted);
      }
      .member-since {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }

      /* Sidebar Nav */
      .sidebar-nav {
        padding: 8px 0;
      }
      .sidebar-nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        transition: all 180ms;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        border-left: 3px solid transparent;
      }
      .sidebar-nav-item:hover {
        color: var(--dark);
        background: #fdf3ee;
      }
      .sidebar-nav-item.active {
        color: var(--primary);
        background: #fdf3ee;
        border-left-color: var(--primary);
        font-weight: 600;
      }
      .nav-badge {
        margin-left: auto;
        background: var(--primary);
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 999px;
      }

      /* Pill Buttons Styling */
      .pill-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: white;
        font-size: 13px;
        font-weight: 600;
        color: var(--dark);
        cursor: pointer;
        transition: all 200ms;
        margin-right: 8px;
        margin-bottom: 8px;
      }
      .pill-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: #fdf3ee;
      }
      .pill-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .pill-btn svg {
        width: 14px;
        height: 14px;
      }

      /* MAIN CONTENT */
      .section-panel {
      }

      /* Cards */
      .content-card {
        background: white;
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 28px;
        margin-bottom: 20px;
      }
      .card-title {
        font-family: "Fraunces", serif;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .card-title svg {
        color: var(--primary);
      }

      /* STATS */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: white;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 20px;
        text-align: center;
      }
      .stat-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
      }
      .stat-value {
        font-family: "Fraunces", serif;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .stat-label {
        font-size: 12px;
        color: var(--muted);
      }

      /* ORDERS */
      .order-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
      }
      .order-item:last-child {
        border-bottom: none;
      }
      .order-img {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: cover;
        background: var(--border);
        flex-shrink: 0;
      }
      .order-info {
        flex: 1;
        min-width: 0;
      }
      .order-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .order-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .order-status {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }
      .status-delivered {
        background: #f0fdf4;
        color: var(--success);
      }
      .status-processing {
        background: #fff7ed;
        color: #c2410c;
      }
      .status-shipped {
        background: #eff6ff;
        color: #1d4ed8;
      }
      .order-price {
        font-size: 14px;
        font-weight: 700;
        margin-left: 8px;
        white-space: nowrap;
      }

      /* PROFILE FORM */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        margin-bottom: 0;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form-input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: "Work Sans", sans-serif;
        font-size: 14px;
        color: var(--dark);
        background: white;
        outline: none;
        transition: border-color 200ms;
      }
      .form-input:focus {
        border-color: var(--primary);
      }
      .form-input:disabled {
        background: var(--light);
        color: var(--muted);
        cursor: not-allowed;
      }
      .full-width {
        grid-column: 1 / -1;
      }
      .save-btn {
        margin-top: 20px;
        padding: 11px 28px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 999px;
        font-family: "Work Sans", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 200ms;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .save-btn:hover:not(:disabled) {
        background: var(--primary-dark);
      }
      .save-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* WISHLIST */
      .wishlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
      }
      .wishlist-card {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 200ms;
        background: var(--light);
        position: relative;
      }
      .wishlist-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(44, 38, 36, 0.1);
      }
      .wishlist-card img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        display: block;
      }
      .wishlist-card-info {
        padding: 10px;
      }
      .wishlist-card-name {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .wishlist-card-price {
        font-size: 12px;
        color: var(--primary);
        font-weight: 700;
      }
      .wishlist-remove {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        background: white;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        color: var(--muted);
        transition: all 200ms;
        border: none;
      }
      .wishlist-remove:hover {
        background: var(--primary);
        color: white;
      }

      /* TOAST */
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--dark);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        animation: slideUp 300ms ease;
        z-index: 9999;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      /* ═══════════════════════════════════════
         TABLET (max 900px)
      ═══════════════════════════════════════ */
      @media (max-width: 900px) {
        .account-wrapper {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 16px 16px 64px;
        }
        .account-sidebar {
          position: static;
          border-radius: 16px;
        }
        .sidebar-nav {
          display: flex;
          flex-direction: row;
          overflow-x: auto;
          padding: 8px 12px 12px;
          gap: 6px;
          scrollbar-width: none;
        }
        .sidebar-nav::-webkit-scrollbar {
          display: none;
        }
        .sidebar-nav-item {
          border-left: none !important;
          border-radius: 999px;
          padding: 8px 14px;
          white-space: nowrap;
          flex-shrink: 0;
          font-size: 13px;
          background: var(--light);
        }
        .sidebar-nav-item.active {
          background: #fdf3ee;
          outline: 2px solid var(--primary);
          outline-offset: -2px;
        }
      }

      /* ═══════════════════════════════════════
         MOBILE (max 600px)
      ═══════════════════════════════════════ */
      @media (max-width: 600px) {
        .nav-bar {
          padding: 0 16px;
          height: 60px;
        }
        .nav-content {
          width: 100%;
          justify-content: space-between;
        }
        .logo span {
          display: none;
        }
        .logo::after {
          content: "VC";
          font-family: "Fraunces", serif;
          font-weight: 700;
        }

        .account-wrapper {
          padding: 12px 12px 72px;
          gap: 12px;
        }

        .sidebar-nav {
          padding: 8px;
          justify-content: space-between;
        }
        .sidebar-nav-item {
          padding: 8px 10px;
          font-size: 11px;
          flex-direction: column;
          align-items: center;
          background: transparent;
          gap: 4px;
        }
        .sidebar-nav-item svg {
          width: 20px;
          height: 20px;
        }
        .sidebar-nav-item.active {
          outline: none;
          background: #fdf3ee;
          color: var(--primary);
        }

        .pill-btn {
          padding: 6px 12px;
          font-size: 12px;
        }

        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        .stat-card:nth-child(3) {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-logo">Vintage Collections</div>
    </div>

    <!-- NAV -->
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="index.html" class="logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="22"
            height="22"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Vintage Collections</span>
        </a>
        <div class="nav-right">
          <button class="icon-btn" onclick="window.location.href = 'shop.html'">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              ></path>
            </svg>
            <span class="cart-badge" id="cart-count">0</span>
          </button>
          <button class="signout-btn" onclick="handleSignOut()">
            Sign Out
          </button>
        </div>
      </div>
    </nav>

    <!-- ACCOUNT LAYOUT -->
    <div class="account-wrapper">
      <aside class="account-sidebar">
        <div class="profile-summary">
          <div
            class="avatar-wrap"
            title="Change profile picture"
            onclick="document.getElementById('avatar-input').click()"
          >
            <img
              id="profile-img"
              class="avatar-initials"
              style="object-fit: cover; display: none"
            />
            <div class="avatar-initials" id="avatar-initials">VC</div>
            <div class="avatar-badge">
              <svg viewBox="0 0 24 24" fill="white" width="10" height="10">
                <path
                  d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                  stroke="white"
                  fill="none"
                  stroke-width="2"
                />
                <path
                  d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                  stroke="white"
                  fill="none"
                  stroke-width="2"
                />
              </svg>
            </div>
          </div>
          <input type="file" id="avatar-input" hidden accept="image/*" />
          <div class="profile-text">
            <div class="profile-name" id="profile-name">Loading...</div>
            <div class="profile-email" id="profile-email">—</div>
            <div class="member-since" id="member-since"></div>
          </div>
        </div>
        <div class="sidebar-nav">
          <button
            class="sidebar-nav-item active"
            data-section="overview"
            onclick="showSection('overview')"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Overview
          </button>
          <button
            class="sidebar-nav-item"
            data-section="orders"
            onclick="showSection('orders')"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 01-8 0"></path>
            </svg>
            Orders
            <span class="nav-badge" id="orders-nav-badge">0</span>
          </button>
          <button
            class="sidebar-nav-item"
            data-section="wishlist"
            onclick="showSection('wishlist')"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            Wishlist
            <span class="nav-badge" id="wishlist-nav-badge">0</span>
          </button>
          <button
            class="sidebar-nav-item"
            data-section="profile"
            onclick="showSection('profile')"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
          </button>
          <button
            class="sidebar-nav-item"
            data-section="security"
            onclick="showSection('security')"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Security
          </button>
        </div>
      </aside>

      <main class="account-main">
        <!-- OVERVIEW -->
        <div id="section-overview" class="section-panel">
          <div class="content-card">
            <h2 class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
              Account Overview
            </h2>
          <div class="stats-grid">
            <!-- Stats will be loaded via JS -->

            <div class="stat-card">
              <div class="stat-icon" style="background: #fdf3ee">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#d5572a"
                  stroke-width="2"
                  width="22"
                  height="22"
                >
                  <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                  <line x1="3" y1="6" x2="21" y2="6" />
                  <path d="M16 10a4 4 0 01-8 0" />
                </svg>
              </div>
              <div class="stat-value" id="stat-total-orders">0</div>
              <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: #fff7ed">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#e3a23a"
                  stroke-width="2"
                  width="22"
                  height="22"
                >
                  <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                  />
                </svg>
              </div> 
              <div class="stat-value" id="stat-wishlist-items">0</div>
              <div class="stat-label">Wishlist Items</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: #f0fdf4">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#2f6f4f"
                  stroke-width="2"
                  width="22"
                  height="22"
                >
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
              </div>
              <div class="stat-value" id="stat-member-since"></div>
              <div class="stat-label">Member Since</div>
            </div>
          </div>
          <div class="content-card" style="margin-top: 20px;">
            <h2 class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 01-8 0" />
              </svg>
              Recent Orders
            </h2>
            <div id="orders-list"></div>
          </div>
        </div>

        <!-- ORDERS -->
        <div id="section-orders" class="section-panel" style="display: none;">
          <div class="content-card">
            <h2 class="card-title">My Orders</h2>
            <div id="orders-list"></div>
          </div>
        </div>

        <!-- OTHER SECTIONS (WISHLIST, PROFILE, SECURITY) -->
        <div id="section-wishlist" class="section-panel" style="display: none;">
          <div class="content-card">
            <h2 class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              My Wishlist
            </h2>
            <div id="wishlist-grid-container">
              <!-- Wishlist items will be loaded here -->
            </div>
          </div>
        </div>
        <div id="section-profile" class="section-panel">
          <div class="content-card">
            <h2 class="card-title">Profile Info</h2>
            <div class="form-grid">
              <div class="form-group">
                <label>First Name</label
                ><input type="text" id="edit-firstname" class="form-input" />
              </div>
              <div class="form-group">
                <label>Last Name</label
                ><input type="text" id="edit-lastname" class="form-input" />
              </div>
              <div class="form-group full-width">
                <label>Email</label
                ><input
                  type="email"
                  id="edit-email"
                  class="form-input"
                  disabled
                />
              </div>
              <div class="form-group full-width">
                <label>Phone Number</label>
                <input type="tel" id="edit-phone" class="form-input" />
              </div>
              <div class="form-group full-width">
                <label>Address</label>
                <input type="text" id="edit-address" class="form-input" />
              </div>
            </div>
            <button class="save-btn" onclick="saveProfile()">
              Save Changes
            </button>
          </div>
        </div>
        <div id="section-security" class="section-panel" style="display: none;">
          <div class="content-card">
            <h2 class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              Security
            </h2>
            <div class="form-grid">
              <div class="form-group full-width">
                <label>Current Password</label>
                <input type="password" id="current-password" class="form-input" placeholder="Enter current password" />
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" class="form-input" placeholder="Enter new password" />
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirm-new-password" class="form-input" placeholder="Confirm new password" />
              </div>
            </div>
            <button class="save-btn" onclick="changePassword()">
              Change Password
            </button>

            <hr style="border-top: 1px solid var(--border); margin: 30px 0 20px;" />

            <h2 class="card-title" style="color: var(--danger);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="color: var(--danger);">
                <path d="M10 12V17" /><path d="M14 12V17" /><path d="M4 7H20" /><path d="M6 10L6 18C6 19.6569 7.34315 21 9 21H15C16.6569 21 18 19.6569 18 18V10" /><path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z" />
              </svg>
              Danger Zone
            </h2>
            <p style="font-size: 13px; color: var(--muted); margin-bottom: 15px;">
              Permanently delete your account and all associated data. This action cannot be undone.
            </p>
            <button class="save-btn" style="background: var(--danger);" onclick="deleteAccount()">
              Delete Account
            </button>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        deleteDoc,
        Timestamp,
        updateDoc,
        collection,
        query,
        where,
        getDocs,
        orderBy,
        limit,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
      import * as firebaseConfigModule from "./firebase-config.js";

      const firebaseConfig =
        firebaseConfigModule.firebaseConfig ?? firebaseConfigModule.default;
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentUser = null;
      let userProfileData = {};
      let userOrders = [];
      let userWishlistItems = [];
      
      // ─── AUTH LOGIC ───
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "auth.html";
          return;
        }
        currentUser = user;
        loadAllData();
        setupSidebarNav();
      });

      async function loadAllData() {
        try {
          const userRef = doc(db, "users", currentUser.uid);
          const snap = await getDoc(userRef);
          userProfileData = snap.data() || {};

          const photo = userProfileData.photoURL || currentUser.photoURL;
          if (photo) {
            // Hide initials and show image
            document.getElementById("avatar-initials").style.display = "none";
            document.getElementById("profile-img").classList.remove("avatar-initials"); // Remove initial styling
            document.getElementById("profile-img").src = photo;
            document.getElementById("profile-img").style.display = "block";
          } else {
            document.getElementById("avatar-initials").textContent = (
              userProfileData.firstName ||
              currentUser.displayName ||
              "V"
            )
              .charAt(0)
              .toUpperCase() || "V";
            document.getElementById("profile-img").style.display = "none";
            document.getElementById("avatar-initials").style.display = "flex"; // Ensure initials are visible
          }

          document.getElementById("profile-name").textContent =
            userProfileData.firstName && userProfileData.lastName
              ? `${userProfileData.firstName} ${userProfileData.lastName}`
              : currentUser.displayName || "User";
          document.getElementById("profile-email").textContent =
            currentUser.email;
          document.getElementById("stat-member-since").textContent = userProfileData.createdAt ? formatDate(userProfileData.createdAt) : 'N/A';

          document.getElementById("edit-firstname").value =
            userProfileData.firstName || "";
          document.getElementById("edit-lastname").value =
            userProfileData.lastName || "";
          document.getElementById("edit-phone").value = userProfileData.phone || "";
          document.getElementById("edit-address").value = userProfileData.address || "";
          document.getElementById("edit-email").value = currentUser.email;

          loadOrders();
          loadWishlist();
        } catch (e) {
          console.error(e);
        } finally {
          document.getElementById("loading-screen").style.display = "none";
        }
      }

      async function loadOrders() {
        const q = query(
          collection(db, "orders"),
          where("userId", "==", currentUser.uid),
          orderBy("createdAt", "desc"),
          limit(5),
        );
        const snap = await getDocs(q);
        const orders = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        userOrders = orders; // Store for full orders section
        if (document.getElementById("stat-total-orders")) document.getElementById("stat-total-orders").textContent = orders.length;
        if (document.getElementById("orders-nav-badge")) document.getElementById("orders-nav-badge").textContent = orders.length;

        const html = orders
          .map((o) => {
            const itemImg =
              o.items?.[0]?.image || "https://placehold.co/60x60?text=Order";
            return `
              <div class="order-item">
                <img src="${itemImg}" class="order-img" alt="Product">
                <div class="order-info">
                  <div class="order-name">Order #${o.id.slice(-6).toUpperCase()}</div>
                  <div class="order-meta">${o.status} • ${o.items?.length || 0} items</div>
                </div>
                <div class="order-price">KES ${parseFloat(o.total || 0).toLocaleString()}</div>
              </div>`;
          })
          .join("");
        document.getElementById("orders-list").innerHTML =
          html ||
          "<p style='padding:20px; color:var(--muted); text-align: center;'>No recent orders found.</p>";
      }

      async function renderAllOrders() {
        const q = query(
          collection(db, "orders"),
          where("userId", "==", currentUser.uid),
          orderBy("createdAt", "desc"),
        );
        const snap = await getDocs(q);
        const allUserOrders = snap.docs.map((d) => ({ id: d.id, ...d.data() }));

        const ordersListContainer = document.getElementById("orders-list"); // This ID is used in overview and full orders
        if (!ordersListContainer) return;

        if (allUserOrders.length === 0) {
          ordersListContainer.innerHTML = "<p style='padding:20px; color:var(--muted); text-align: center;'>You haven't placed any orders yet.</p>";
          return;
        }

        ordersListContainer.innerHTML = allUserOrders
          .map((o) => {
            const itemImg = o.items?.[0]?.image || "https://placehold.co/60x60?text=Order";
            return `
              <div class="order-item">
                <img src="${itemImg}" class="order-img" alt="Product">
                <div class="order-info">
                  <div class="order-name">Order #${o.id.slice(-6).toUpperCase()}</div>
                  <div class="order-meta">${o.status} • ${o.items?.length || 0} items • ${formatDate(o.createdAt)}</div>
                </div>
                <div class="order-price">KES ${parseFloat(o.total || 0).toLocaleString()}</div>
              </div>`;
          })
          .join("");
      }

      async function loadWishlist() {
        try {
          const wishlistRef = collection(db, "users", currentUser.uid, "wishlist");
          const wishlistSnap = await getDocs(wishlistRef);
          
          const productIds = wishlistSnap.docs.map(d => d.id);
          userWishlistItems = [];

          if (productIds.length > 0) {
            // Fetch product details for each item in the wishlist
            for (const productId of productIds) {
              const productDoc = await getDoc(doc(db, "products", productId));
              if (productDoc.exists()) {
                const p = productDoc.data();
                userWishlistItems.push({
                  id: productDoc.id,
                  name: p.name,
                  price: p.price,
                  image: (p.images && p.images[0]) || "https://placehold.co/100x100?text=No+Image",
                });
              } else {
                // If product doesn't exist, remove it from wishlist
                await deleteDoc(doc(wishlistRef, productId));
              }
            }
          }
          if (document.getElementById("stat-wishlist-items")) document.getElementById("stat-wishlist-items").textContent = userWishlistItems.length;
          if (document.getElementById("wishlist-nav-badge")) document.getElementById("wishlist-nav-badge").textContent = userWishlistItems.length;
          renderWishlist();
        } catch (error) {
          console.error("Error loading wishlist:", error);
          showToast("Error loading wishlist.", "danger");
        }
      }

      function renderWishlist() {
        const container = document.getElementById("wishlist-grid-container");
        if (!container) return;

        if (userWishlistItems.length === 0) {
          container.innerHTML = "<p style='grid-column: 1/-1; padding:20px; color:var(--muted); text-align: center;'>Your wishlist is empty.</p>";
          return;
        }

        container.innerHTML = userWishlistItems.map(item => `
          <div class="wishlist-card" onclick="window.location.href='product.html?id=${item.id}'">
            <img src="${item.image}" alt="${item.name}">
            <div class="wishlist-card-info">
              <div class="wishlist-card-name">${item.name}</div>
              <div class="wishlist-card-price">KES ${item.price.toLocaleString()}</div>
            </div>
            <button class="wishlist-remove" onclick="removeProductFromWishlist(event, '${item.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        `).join('');
      }

      window.removeProductFromWishlist = async (event, productId) => {
        event.stopPropagation(); // Prevent navigating to product page
        try {
          await deleteDoc(doc(db, "users", currentUser.uid, "wishlist", productId));
          showToast("Item removed from wishlist.", "success");
          loadWishlist(); // Reload wishlist to update UI
        } catch (error) {
          console.error("Error removing from wishlist:", error);
          showToast("Failed to remove item from wishlist.", "danger");
        }
      }

      // Profile Photo Edit Logic
      document
        .getElementById("avatar-input")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64String = reader.result;
            try {
              document.getElementById("profile-img").src = base64String;
              document.getElementById("profile-img").style.display = "block";
              document.getElementById("avatar-initials").style.display = "none";

              await setDoc(doc(db, "users", currentUser.uid), {
                photoURL: base64String,
                updatedAt: serverTimestamp(),
              }, { merge: true });
              showToast("Profile photo updated!", "success");
            } catch (err) {
              console.error("Error saving photo:", err);
              showToast("Failed to update photo.", "danger");
            }
          };
          reader.readAsDataURL(file);
        });

      window.saveProfile = async () => {
        const firstName = document.getElementById("edit-firstname").value.trim();
        const lastName = document.getElementById("edit-lastname").value.trim();
        const phone = document.getElementById("edit-phone").value.trim();
        const address = document.getElementById("edit-address").value.trim();

        if (!firstName || !lastName) {
          showToast("First name and last name are required.", "danger");
          return;
        }

        try {
          await updateDoc(doc(db, "users", currentUser.uid), {
            firstName: firstName,
            lastName: lastName,
            phone: phone,
            address: address,
            updatedAt: serverTimestamp(),
          });

          // Update Firebase Auth profile display name
          await updateProfile(currentUser, {
            displayName: `${firstName} ${lastName}`,
          });

          showToast("Profile updated successfully!", "success");
          loadAllData(); // Reload data to update UI
        } catch (error) {
          console.error("Error saving profile:", error);
          showToast("Failed to save profile. Please try again.", "danger");
        }
      };

      window.changePassword = async () => {
        const currentPassword = document.getElementById("current-password").value;
        const newPassword = document.getElementById("new-password").value;
        const confirmNewPassword = document.getElementById("confirm-new-password").value;

        if (!currentPassword || !newPassword || !confirmNewPassword) {
          showToast("All password fields are required.", "danger");
          return;
        }
        if (newPassword !== confirmNewPassword) {
          showToast("New password and confirmation do not match.", "danger");
          return;
        }
        if (newPassword.length < 6) {
          showToast("New password must be at least 6 characters long.", "danger");
          return;
        }

        try {
          // Re-authenticate user before changing password
          const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
          await reauthenticateWithCredential(currentUser, credential);
          await updatePassword(currentUser, newPassword);
          showToast("Password updated successfully!", "success");
          // Clear password fields
          document.getElementById("current-password").value = "";
          document.getElementById("new-password").value = "";
          document.getElementById("confirm-new-password").value = "";
        } catch (error) {
          console.error("Error changing password:", error);
          showToast("Failed to change password. Please check your current password.", "danger");
        }
      };

      window.deleteAccount = async () => {
        if (!confirm("Are you sure you want to delete your account? This action is irreversible.")) {
          return;
        }
        const currentPassword = prompt("Please enter your current password to confirm account deletion:");
        if (!currentPassword) {
          showToast("Account deletion cancelled.", "danger");
          return;
        }

        try {
          // Re-authenticate user before deleting account
          const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
          await reauthenticateWithCredential(currentUser, credential);
          await deleteUser(currentUser);
          showToast("Account deleted successfully. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "auth.html";
          }, 2000);
        } catch (error) {
          console.error("Error deleting account:", error);
          showToast("Failed to delete account. Please check your password or try again later.", "danger");
        }
      };

      function setupSidebarNav() {
        document.querySelectorAll(".sidebar-nav-item").forEach(item => {
          item.addEventListener("click", () => {
            const section = item.dataset.section;
            showSection(section);
          });
        });
      }

      window.showSection = (sectionId) => {
        document.querySelectorAll(".section-panel").forEach(panel => {
          panel.style.display = "none";
        });
        document.getElementById(`section-${sectionId}`).style.display = "block";

        document.querySelectorAll(".sidebar-nav-item").forEach(item => {
          item.classList.remove("active");
        });
        document.querySelector(`.sidebar-nav-item[data-section="${sectionId}"]`).classList.add("active");

        // Re-render content for specific sections if needed
        if (sectionId === 'orders') {
          renderAllOrders();
        } else if (sectionId === 'wishlist') {
          renderWishlist();
        }
      };

      window.handleSignOut = () =>
        signOut(auth).then(() => (window.location.href = "auth.html"));
      window.sendPasswordReset = () =>
        sendPasswordResetEmail(auth, currentUser.email).then(() => {
          showToast("Password reset email sent! Check your inbox.", "success");
        }).catch(error => {
          console.error("Error sending reset email:", error);
          showToast("Failed to send password reset email.", "danger");
        });

      function formatDate(timestamp) {
        if (!timestamp) return "N/A";
        const date = new Date(timestamp.seconds * 1000);
        return date.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function showToast(message, type = "success") {
        const toast = document.createElement("div");
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 300ms";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }
    </script>
  </body>
</html>

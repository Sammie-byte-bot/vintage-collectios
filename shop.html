<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Vintage Collections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Work Sans", sans-serif;
        box-sizing: border-box;
      }
      h1,
      h2,
      h3,
      .serif-heading {
        font-family: "Fraunces", serif;
      }
      :root {
        --primary: #d5572a;
        --primary-dark: #b8451f;
        --accent: #2f6f4f;
        --gold: #e3a23a;
        --dark: #2c2624;
        --light: #fdf8f3;
        --border: #f0e2d3;
        --muted: #8a7d74;
      }
      body {
        background-color: var(--light);
        color: var(--dark);
        margin: 0;
      }

      /* ============ NAV ============ */
      .nav-bar {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 200;
        height: 64px;
        display: flex;
        align-items: center;
      }
      .nav-content {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .logo {
        font-family: "Fraunces", serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--dark);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        flex-shrink: 0;
      }
      .logo svg {
        color: var(--primary);
      }
      .search-bar {
        display: flex;
        gap: 8px;
        flex: 1;
        max-width: 480px;
      }
      .search-input {
        flex: 1;
        padding: 9px 16px;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        font-size: 14px;
        outline: none;
        transition: border-color 200ms;
        background: white;
        color: var(--dark);
        min-width: 0;
      }
      .search-input::placeholder {
        color: #b8a99c;
      }
      .search-input:focus {
        border-color: var(--primary);
      }
      .search-btn {
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 999px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background-color 200ms;
      }
      .search-btn:hover {
        background-color: var(--primary-dark);
      }
      .nav-links {
        display: flex;
        gap: 20px;
        align-items: center;
      }
      .nav-link {
        color: var(--dark);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 200ms;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--primary);
      }
      .nav-link.active {
        color: var(--primary);
        border-bottom: 2px solid var(--primary);
        padding-bottom: 2px;
      }
      .nav-icons {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dark);
        transition: color 200ms;
        padding: 8px;
        position: relative;
        border-radius: 8px;
      }
      .icon-btn:hover {
        color: var(--primary);
        background: #fdf3ee;
      }
      .cart-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        background: var(--primary);
        color: white;
        border-radius: 50%;
        width: 17px;
        height: 17px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }
      .hamburger-btn {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dark);
        padding: 8px;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .hamburger-btn:hover {
        background: #fdf3ee;
      }

      .desktop-wishlist {
        display: flex;
      }

      /* ============ MOBILE NAV DRAWER ============ */
      .mobile-nav-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(44, 38, 36, 0.5);
        z-index: 300;
      }
      .mobile-nav-drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: 280px;
        height: 100vh;
        background: white;
        z-index: 400;
        padding: 24px;
        transform: translateX(100%);
        transition: transform 300ms ease;
        overflow-y: auto;
      }
      .mobile-nav-drawer.open {
        transform: translateX(0);
      }
      .mobile-nav-overlay.open {
        display: block;
      }
      .drawer-close {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 24px;
      }
      .close-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dark);
        padding: 8px;
        border-radius: 8px;
      }
      .close-btn:hover {
        background: #fdf3ee;
        color: var(--primary);
      }
      .drawer-links {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 24px;
      }
      .drawer-link {
        display: block;
        padding: 12px 16px;
        color: var(--dark);
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        transition: all 200ms;
      }
      .drawer-link:hover,
      .drawer-link.active {
        background: #fdf3ee;
        color: var(--primary);
      }
      .drawer-divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
      }
      .drawer-action {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        color: var(--dark);
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        cursor: pointer;
        transition: all 200ms;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
      }
      .drawer-action:hover {
        background: #fdf3ee;
        color: var(--primary);
      }

      /* ============ MOBILE SEARCH ============ */
      .mobile-search-bar {
        display: none;
        padding: 10px 16px;
        background: white;
        border-bottom: 1px solid var(--border);
      }
      .mobile-search-inner {
        display: flex;
        gap: 8px;
      }

      /* ============ BREADCRUMB ============ */
      .breadcrumb {
        max-width: 1400px;
        margin: 0 auto;
        padding: 12px 24px;
        font-size: 12px;
        color: var(--muted);
      }
      .breadcrumb a {
        color: var(--primary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }

      /* ============ ETSY-STYLE TOP FILTER BAR (desktop) ============ */
      .filter-bar {
        display: none;
        background: white;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 64px;
        z-index: 100;
      }
      .bestseller-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #fff;
        color: var(--dark);
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        z-index: 10;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }
      .discount-pill {
        background-color: #c1272d;
        color: #ffffff;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
        letter-spacing: 0.02em;
      }
      .filter-bar-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        height: 56px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .filter-bar-inner::-webkit-scrollbar {
        display: none;
      }
      .filter-pill-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1.5px solid #ccc;
        border-radius: 24px;
        background: white;
        font-size: 13px;
        font-weight: 500;
        color: var(--dark);
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        transition: all 180ms;
        position: relative;
      }
      .filter-pill-btn:hover {
        border-color: var(--dark);
      }
      .filter-pill-btn.active {
        border-color: var(--dark);
        background: var(--dark);
        color: white;
      }
      .filter-pill-btn .pill-chevron {
        transition: transform 200ms;
      }
      .filter-pill-btn.open .pill-chevron {
        transform: rotate(180deg);
      }
      .filter-pill-divider {
        width: 1px;
        height: 24px;
        background: var(--border);
        flex-shrink: 0;
        margin: 0 4px;
      }
      .all-filters-btn {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1.5px solid #ccc;
        border-radius: 24px;
        background: white;
        font-size: 13px;
        font-weight: 600;
        color: var(--dark);
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        transition: all 180ms;
      }
      .all-filters-btn:hover {
        border-color: var(--dark);
      }

      /* ============ FILTER DROPDOWN PANEL ============ */
      .filter-dropdown-wrap {
        position: relative;
      }
      .filter-dropdown {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        background: white;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        min-width: 220px;
        box-shadow: 0 8px 24px rgba(44, 38, 36, 0.12);
        z-index: 500;
        display: none;
      }
      .filter-dropdown.open {
        display: block;
      }
      .dropdown-title {
        font-family: "Fraunces", serif;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 14px;
        color: var(--dark);
      }
      .dropdown-option {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      .dropdown-option input[type="checkbox"] {
        cursor: pointer;
        accent-color: var(--primary);
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .dropdown-option label {
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
        flex: 1;
      }
      .dropdown-option input:checked + label {
        color: var(--dark);
        font-weight: 600;
      }
      .price-range-inputs {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 4px;
      }
      .price-input {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        outline: none;
        transition: all 200ms;
        background: white;
        min-width: 0;
      }
      .price-input:focus {
        border-color: var(--primary);
      }
      .price-range-sep {
        color: var(--muted);
        font-weight: 500;
      }
      .dropdown-apply-btn {
        width: 100%;
        padding: 9px;
        background: var(--dark);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 14px;
        transition: background 200ms;
      }
      .dropdown-apply-btn:hover {
        background: var(--primary);
      }

      /* ============ ACTIVE FILTER TAGS ============ */
      .active-filters-bar {
        max-width: 1400px;
        margin: 0 auto;
        padding: 8px 24px 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .active-filter-tag {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px 4px 12px;
        background: #2c2624;
        color: white;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
      }
      .active-filter-tag button {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        opacity: 0.7;
      }
      .active-filter-tag button:hover {
        opacity: 1;
      }
      .clear-all-tag {
        background: none;
        border: none;
        color: var(--primary);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 4px 8px;
        text-decoration: underline;
      }

      /* ============ MAIN LAYOUT (sidebar + grid) ============ */
      .shop-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 24px 48px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 28px;
      }

      /* ---- SIDEBAR (desktop) ---- */
      .sidebar {
        position: sticky;
        top: 130px;
        align-self: start;
        height: fit-content;
      }
      .sidebar-section {
        padding-bottom: 22px;
        margin-bottom: 22px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-section:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }
      .sidebar-title {
        font-family: "Fraunces", serif;
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--dark);
      }
      .sidebar-option {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      .sidebar-option input[type="checkbox"],
      .sidebar-option input[type="radio"] {
        cursor: pointer;
        accent-color: var(--primary);
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sidebar-option label {
        cursor: pointer;
        font-size: 13.5px;
        color: var(--muted);
        flex: 1;
      }
      .sidebar-option input:checked + label {
        color: var(--dark);
        font-weight: 600;
      }
      .sidebar-clear-btn {
        background: none;
        border: none;
        color: var(--primary);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
      }
      .sidebar-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
      }
      .sidebar-header-row .sidebar-title {
        margin-bottom: 0;
      }

      /* ---- RIGHT MAIN COLUMN ---- */
      .main-col {
        min-width: 0;
      }
      .shop-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .results-info {
        font-size: 13px;
        color: var(--muted);
      }
      .sort-dropdown {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 13px;
        background: white;
        cursor: pointer;
        outline: none;
        font-family: "Work Sans", sans-serif;
        color: var(--dark);
      }
      .sort-dropdown:focus {
        border-color: var(--primary);
      }

      /* ============ PRODUCTS GRID ============ */
      .products-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      .product-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 1px 3px rgba(44, 38, 36, 0.07);
        transition: all 250ms cubic-bezier(0.23, 1, 0.32, 1);
        cursor: pointer;
        border: 1px solid var(--border);
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(44, 38, 36, 0.12);
      }
      .product-img-wrap {
        position: relative;
        overflow: hidden;
      }
      .product-image {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
        transition: transform 250ms cubic-bezier(0.23, 1, 0.32, 1);
      }
      .product-card:hover .product-image {
        transform: scale(1.04);
      }
      .wishlist-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 50%;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 200ms;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 10;
        color: var(--dark);
        border: none;
      }
      .wishlist-badge:hover {
        background: var(--primary);
        color: white;
      }
      .wishlist-badge.active {
        background: var(--primary);
        color: white;
      }
      .offer-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: var(--primary);
        color: white;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        z-index: 10;
      }
      .product-info {
        padding: 14px 16px 16px;
      }
      .product-name {
        font-weight: 600;
        font-size: 13.5px;
        margin-bottom: 3px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .product-seller {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .rating {
        display: flex;
        gap: 2px;
        margin-bottom: 8px;
        align-items: center;
      }
      .star {
        color: var(--gold);
        width: 13px;
        height: 13px;
      }
      .star-empty {
        color: #e6dccf;
        width: 13px;
        height: 13px;
      }
      .rating-text {
        color: var(--muted);
        font-size: 11px;
        margin-left: 4px;
      }
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      .price {
        font-weight: 700;
        color: var(--dark);
        font-size: 15px;
      }
      .original-price {
        text-decoration: line-through;
        color: var(--muted);
        font-size: 12px;
      }

      /* ============ LOADING SKELETONS ============ */
      .loading-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .loading-skeleton {
        background: linear-gradient(
          90deg,
          #f0e8e0 25%,
          #e8dcd4 50%,
          #f0e8e0 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* ============ TOAST ============ */
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--dark);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        animation: slideUp 300ms cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 9999;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        max-width: 320px;
      }

      /* ============ MOBILE FILTERS DRAWER (sidebar moves here on small screens) ============ */
      .all-filters-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(44, 38, 36, 0.5);
        z-index: 600;
      }
      .all-filters-overlay.open {
        display: block;
      }
      .all-filters-drawer {
        position: fixed;
        top: 0;
        left: 0;
        width: 320px;
        height: 100vh;
        background: white;
        z-index: 700;
        display: flex;
        flex-direction: column;
        transform: translateX(-100%);
        transition: transform 300ms ease;
      }
      .all-filters-drawer.open {
        transform: translateX(0);
      }
      .drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .drawer-header h2 {
        font-family: "Fraunces", serif;
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }
      .drawer-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
        flex-shrink: 0;
      }
      .drawer-footer-btn {
        flex: 1;
        padding: 11px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid var(--dark);
        transition: all 200ms;
      }
      .drawer-footer-btn.clear {
        background: white;
        color: var(--dark);
      }
      .drawer-footer-btn.clear:hover {
        background: #fdf3ee;
        border-color: var(--primary);
        color: var(--primary);
      }
      .drawer-footer-btn.apply {
        background: var(--dark);
        color: white;
        border-color: var(--dark);
      }
      .drawer-footer-btn.apply:hover {
        background: var(--primary);
        border-color: var(--primary);
      }

      /* ============ RESPONSIVE ============ */
      @media (max-width: 1024px) {
        .shop-container {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .filter-bar {
          display: block;
        }
        .all-filters-btn {
          display: flex;
        }
        .desktop-wishlist {
          display: none;
        }
      }

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
      import * as firebaseConfigModule from "./firebase-config.js";
      const firebaseConfig =
        firebaseConfigModule.firebaseConfig ?? firebaseConfigModule.default;

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let shopProducts = [];
      let filteredProducts = [];
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let inStockActive = false;
      let onSaleActive = false;

      async function init() {
        await loadProducts();
        updateCartCount();
        updateWishlistCount();
        buildDrawerFromSidebar();

        // Handle search query from URL
        const params = new URLSearchParams(window.location.search);
        const q = params.get("q");
        if (q) {
          document.getElementById("search-input").value = q;
          document.getElementById("mobile-search-input").value = q;
          filterBySearch(q.toLowerCase());
        } else {
          applyFilters();
        }
      }

      async function loadProducts() {
        try {
          const q = query(
            collection(db, "products"),
            orderBy("createdAt", "desc"),
          );
          const snapshot = await getDocs(q);
          shopProducts = snapshot.docs.map((doc) => {
            const d = doc.data();
            return {
              id: doc.id,
              ...d,
              image:
                (d.images && d.images[0]) ||
                "https://placehold.co/400x400?text=No+Image",
            };
          });
          filteredProducts = [...shopProducts];
          renderProducts(filteredProducts);
        } catch (error) {
          console.error("Error loading products:", error);
          document.getElementById("products-grid").innerHTML =
            '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#b8a99c;">Failed to load products. Please refresh.</div>';
        }
      }

      function renderProducts(products) {
        const grid = document.getElementById("products-grid");
        document.getElementById("results-count").textContent = products.length;
        if (products.length === 0) {
          grid.innerHTML =
            '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#b8a99c;"><svg style="margin:0 auto 16px;display:block;opacity:.4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p style="font-size:15px;font-weight:500;margin:0 0 8px;">No items found</p><p style="font-size:13px;margin:0;">Try adjusting or clearing your filters.</p></div>';
          return;
        }
        grid.innerHTML = products
          .map((p) => {
            const stars = renderStars(p.rating);
            return `
          <div class="product-card" onclick="viewProduct('${p.id}')">
            <div class="product-img-wrap">
              <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=${encodeURIComponent(p.name)}'">
              ${p.onSale && p.discount ? `<div class="offer-badge">${p.discount} OFF</div>` : ""}
              <button class="wishlist-badge ${wishlist.includes(p.id) ? "active" : ""}" onclick="toggleProductWishlist(event,'${p.id}')" title="${wishlist.includes(p.id) ? "Remove from wishlist" : "Add to wishlist"}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="${wishlist.includes(p.id) ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
              </button>
            </div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-seller">${p.seller || "Vintage Collections"}</div>
              <div class="rating">
                ${stars.html}
                <span class="rating-text">${stars.displayRating} (${p.reviews || 0})</span>
              </div>
              <div class="price-row">
                <span class="price">KES ${(p.price || 0).toLocaleString()}</span>
                ${(p.onSale || p.originalPrice > p.price) && p.originalPrice ? `<span class="original-price">KES ${p.originalPrice.toLocaleString()}</span>` : ""}
                ${discountPill(p)}
              </div>
            </div>
          </div>`;
          })
          .join("");
      }

      function renderStars(rating) {
        let r = Number(rating);
        if (!r || r < 4) {
          r = Math.round((4 + Math.random()) * 2) / 2;
        }
        const fullStars = Math.min(5, Math.round(r));
        const fullStarSvg =
          '<svg class="star" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>';
        const emptyStarSvg =
          '<svg class="star-empty" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>';
        let html = "";
        for (let i = 0; i < 5; i++) {
          html += i < fullStars ? fullStarSvg : emptyStarSvg;
        }
        return { html, displayRating: r.toFixed(1) };
      }

      function discountPill(p) {
        const pct = discountPercent(p);
        return pct ? `<span class="discount-pill">-${pct}%</span>` : "";
      }

      function discountPercent(p) {
        if (p.discount) {
          const match = String(p.discount).match(/\d+/);
          if (match) return match[0];
        }
        if (p.originalPrice && p.price && p.originalPrice > p.price) {
          return Math.round((1 - p.price / p.originalPrice) * 100);
        }
        return null;
      }

      /* ======================================================
         FILTER STATE
         Each filter exists in three places that must stay
         in sync: the top pill dropdowns (id="..."),
         the desktop sidebar (id="s-..."), and the mobile
         "All Filters" drawer (id="d-..." cloned from sidebar).
      ====================================================== */
      const CATS = [
        ["fashion", "Fashion"],
        ["electronics", "Electronics"],
        ["home", "Home & Living"],
        ["accessories", "Accessories"],
      ];

      function getFilterState() {
        const cats = [];
        CATS.forEach(([key, val]) => {
          const pill = document.getElementById(`cat-${key}`);
          if (pill?.checked) cats.push(val);
        });
        const ratings = [];
        if (document.getElementById("rating-4")?.checked) ratings.push(4);
        if (document.getElementById("rating-3")?.checked) ratings.push(3);
        const priceMin =
          parseInt(document.getElementById("price-min")?.value) || 0;
        const priceMax =
          parseInt(document.getElementById("price-max")?.value) || Infinity;
        return { cats, ratings, priceMin, priceMax };
      }

      // Sync all three filter surfaces (pills, sidebar, drawer) so they always agree
      function syncAllFilterUI(source) {
        CATS.forEach(([key]) => {
          const a = document.getElementById(`cat-${key}`);
          const b = document.getElementById(`s-cat-${key}`);
          const c = document.getElementById(`d-cat-${key}`);
          const val =
            source === "pill"
              ? a?.checked
              : source === "sidebar"
                ? b?.checked
                : c?.checked;
          if (a) a.checked = !!val;
          if (b) b.checked = !!val;
          if (c) c.checked = !!val;
        });
        ["rating-4", "rating-3"].forEach((suffix) => {
          const a = document.getElementById(suffix);
          const b = document.getElementById(`s-${suffix}`);
          const c = document.getElementById(`d-${suffix}`);
          const val =
            source === "pill"
              ? a?.checked
              : source === "sidebar"
                ? b?.checked
                : c?.checked;
          if (a) a.checked = !!val;
          if (b) b.checked = !!val;
          if (c) c.checked = !!val;
        });
        const priceMinA = document.getElementById("price-min");
        const priceMaxA = document.getElementById("price-max");
        const priceMinB = document.getElementById("s-price-min");
        const priceMaxB = document.getElementById("s-price-max");
        const priceMinC = document.getElementById("d-price-min");
        const priceMaxC = document.getElementById("d-price-max");
        const pmin =
          source === "pill"
            ? priceMinA?.value
            : source === "sidebar"
              ? priceMinB?.value
              : priceMinC?.value;
        const pmax =
          source === "pill"
            ? priceMaxA?.value
            : source === "sidebar"
              ? priceMaxB?.value
              : priceMaxC?.value;
        if (priceMinA) priceMinA.value = pmin || "";
        if (priceMinB) priceMinB.value = pmin || "";
        if (priceMinC) priceMinC.value = pmin || "";
        if (priceMaxA) priceMaxA.value = pmax || "";
        if (priceMaxB) priceMaxB.value = pmax || "";
        if (priceMaxC) priceMaxC.value = pmax || "";
      }

      window.applyFilters = function (source) {
        if (source) syncAllFilterUI(source);
        const { cats, ratings, priceMin, priceMax } = getFilterState();
        const sortBy = document.getElementById("sort-select").value;

        filteredProducts = shopProducts.filter((p) => {
          const catOk = cats.length === 0 || cats.includes(p.category);
          const priceOk = p.price >= priceMin && p.price <= priceMax;
          const ratingOk =
            ratings.length === 0 || ratings.some((r) => p.rating >= r);
          const stockOk = !inStockActive || p.inStock;
          const saleOk = !onSaleActive || p.onSale;
          return catOk && priceOk && ratingOk && stockOk && saleOk;
        });

        if (sortBy === "newest")
          filteredProducts.sort((a, b) => b.id.localeCompare(a.id));
        else if (sortBy === "price-low")
          filteredProducts.sort((a, b) => a.price - b.price);
        else if (sortBy === "price-high")
          filteredProducts.sort((a, b) => b.price - a.price);
        else if (sortBy === "rating")
          filteredProducts.sort((a, b) => b.rating - a.rating);

        renderProducts(filteredProducts);
        updateActiveTags();
        updatePillStates();
        syncAvailabilityCheckboxes();
      };

      function syncAvailabilityCheckboxes() {
        const sSale = document.getElementById("s-avail-sale");
        const dSale = document.getElementById("d-avail-sale");
        if (sSale) sSale.checked = onSaleActive;
        if (dSale) dSale.checked = onSaleActive;
        document
          .getElementById("pill-sale")
          .classList.toggle("active", onSaleActive);
      }

      function updateActiveTags() {
        const bar = document.getElementById("active-filters-bar");
        const tags = [];
        const { cats, ratings, priceMin, priceMax } = getFilterState();
        cats.forEach((c) =>
          tags.push({
            label: c,
            remove: () => {
              const key = CATS.find(([, v]) => v === c)[0];
              ["cat-" + key, "s-cat-" + key, "d-cat-" + key].forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.checked = false;
              });
              applyFilters();
            },
          }),
        );
        if (ratings.includes(4))
          tags.push({
            label: "4 stars & up",
            remove: () => {
              ["rating-4", "s-rating-4", "d-rating-4"].forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.checked = false;
              });
              applyFilters();
            },
          });
        if (ratings.includes(3))
          tags.push({
            label: "3 stars & up",
            remove: () => {
              ["rating-3", "s-rating-3", "d-rating-3"].forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.checked = false;
              });
              applyFilters();
            },
          });
        if (priceMin > 0 || priceMax < Infinity)
          tags.push({
            label: `KES ${priceMin}–${priceMax === Infinity ? "Any" : priceMax.toLocaleString()}`,
            remove: () => {
              [
                "price-min",
                "s-price-min",
                "d-price-min",
                "price-max",
                "s-price-max",
                "d-price-max",
              ].forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.value = "";
              });
              applyFilters();
            },
          });
        if (inStockActive)
          tags.push({
            label: "In Stock",
            remove: () => {
              inStockActive = false;
              applyFilters();
            },
          });
        if (onSaleActive)
          tags.push({
            label: "On Sale",
            remove: () => {
              onSaleActive = false;
              applyFilters();
            },
          });

        if (tags.length === 0) {
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        bar.innerHTML =
          tags
            .map(
              (t, i) => `
          <span class="active-filter-tag">
            ${t.label}
            <button onclick="window.__removeTag(${i})" title="Remove filter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </span>
        `,
            )
            .join("") +
          `<button class="clear-all-tag" onclick="clearAllFilters()">Clear all</button>`;
        window.__tagRemovers = tags.map((t) => t.remove);
        window.__removeTag = (i) => window.__tagRemovers[i]();
      }

      function updatePillStates() {
        const { cats, ratings, priceMin, priceMax } = getFilterState();
        document
          .getElementById("pill-category")
          .classList.toggle("active", cats.length > 0);
        document
          .getElementById("pill-rating")
          .classList.toggle("active", ratings.length > 0);
        document
          .getElementById("pill-price")
          .classList.toggle("active", priceMin > 0 || priceMax < Infinity);
      }

      window.toggleSaleFilter = function () {
        onSaleActive = !onSaleActive;
        applyFilters();
      };

      window.toggleStockFilter = function () {
        inStockActive = !inStockActive;
        applyFilters();
      };

      window.clearAllFilters = function () {
        CATS.forEach(([key]) => {
          ["cat-" + key, "s-cat-" + key, "d-cat-" + key].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.checked = false;
          });
        });
        ["rating-4", "rating-3"].forEach((suffix) => {
          ["", "s-", "d-"].forEach((prefix) => {
            const el = document.getElementById(prefix + suffix);
            if (el) el.checked = false;
          });
        });
        ["price-min", "price-max"].forEach((suffix) => {
          ["", "s-", "d-"].forEach((prefix) => {
            const el = document.getElementById(prefix + suffix);
            if (el) el.value = "";
          });
        });
        inStockActive = false;
        onSaleActive = false;
        closeAllFilters();
        applyFilters();
        showToast("Filters cleared");
      };

      // The mobile/tablet "All Filters" drawer mirrors the sidebar's HTML
      function buildDrawerFromSidebar() {
        const sidebar = document.getElementById("sidebar");
        const drawerBody = document.getElementById("drawer-filter-body");
        // Clone sidebar's inner sections except the "clear all" section
        const clone = sidebar.cloneNode(true);
        clone.removeAttribute("id");
        clone.removeAttribute("class");
        // Remove the trailing "clear all filters" section (drawer has its own footer)
        const sections = clone.querySelectorAll(".sidebar-section");
        sections[sections.length - 1].remove();
        // Re-tag every id "s-..." -> "d-..." and add drawer styling classes
        clone.querySelectorAll("[id]").forEach((el) => {
          el.id = el.id.replace(/^s-/, "d-");
        });
        clone.querySelectorAll(".sidebar-section").forEach((el) => {
          el.classList.add("drawer-filter-section");
          el.style.paddingBottom = "22px";
          el.style.marginBottom = "22px";
          el.style.borderBottom = "1px solid var(--border)";
        });
        clone.querySelectorAll(".sidebar-title").forEach((el) => {
          el.classList.add("drawer-filter-title");
        });
        drawerBody.appendChild(clone);
      }

      window.applyDrawerFilters = function () {
        syncAllFilterUI("drawer");
        inStockActive =
          document.getElementById("d-avail-stock")?.checked ?? inStockActive;
        onSaleActive =
          document.getElementById("d-avail-sale")?.checked ?? onSaleActive;
        closeAllFilters();
        applyFilters();
      };

      /* ======================================================
         WISHLIST / CART
      ====================================================== */
      window.toggleProductWishlist = (event, productId) => {
        event.stopPropagation();
        if (wishlist.includes(productId)) {
          wishlist = wishlist.filter((id) => id !== productId);
          showToast("Removed from wishlist");
        } else {
          wishlist.push(productId);
          showToast("Added to wishlist ❤️");
        }
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
        updateWishlistCount();
        renderProducts(filteredProducts);
      };

      function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        document.getElementById("cart-count").textContent = count;
      }
      function updateWishlistCount() {
        document.getElementById("wishlist-count").textContent = wishlist.length;
      }

      window.goToCart = () =>
        showToast(
          `🛒 Cart (${cart.reduce((s, i) => s + (i.quantity || 1), 0)} items)`,
        );
      window.goToAccount = () => (window.location.href = "account.html");
      window.viewProduct = (id) =>
        (window.location.href = `product.html?id=${id}`);

      window.toggleWishlistPanel = () =>
        (window.location.href = "account.html");

      /* ======================================================
         SEARCH
      ====================================================== */
      window.performSearch = () => {
        const q = document
          .getElementById("search-input")
          .value.trim()
          .toLowerCase();
        filterBySearch(q);
      };
      window.performMobileSearch = () => {
        const q = document
          .getElementById("mobile-search-input")
          .value.trim()
          .toLowerCase();
        filterBySearch(q);
      };

      function filterBySearch(q) {
        if (!q) {
          filteredProducts = [...shopProducts];
        } else {
          filteredProducts = shopProducts.filter(
            (p) =>
              p.name.toLowerCase().includes(q) ||
              p.category.toLowerCase().includes(q) ||
              p.seller.toLowerCase().includes(q),
          );
        }
        renderProducts(filteredProducts);
        document.getElementById("results-count").textContent =
          filteredProducts.length;
      }

      /* ======================================================
         TOAST
      ====================================================== */
      function showToast(message) {
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = message;
        document.body.appendChild(t);
        setTimeout(() => {
          t.style.opacity = "0";
          t.style.transition = "opacity 300ms";
          setTimeout(() => t.remove(), 300);
        }, 3000);
      }
      window.showToast = showToast;

      document.addEventListener("DOMContentLoaded", init);

      // Search on Enter
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          if (document.activeElement?.id === "search-input") performSearch();
          if (document.activeElement?.id === "mobile-search-input")
            performMobileSearch();
        }
      });

      /* ======================================================
         SIDEBAR -> applyFilters trigger
      ====================================================== */
      document.getElementById("sidebar").addEventListener("change", (e) => {
        if (e.target.id === "s-avail-stock") {
          inStockActive = e.target.checked;
        } else if (e.target.id === "s-avail-sale") {
          onSaleActive = e.target.checked;
        }
        applyFilters("sidebar");
      });
    </script>

    <script>
      // ============ Mobile Nav ============
      function openMobileNav() {
        document.getElementById("mobile-nav-drawer").classList.add("open");
        document.getElementById("mobile-nav-overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeMobileNav() {
        document.getElementById("mobile-nav-drawer").classList.remove("open");
        document.getElementById("mobile-nav-overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      // ============ Filter Dropdowns ============
      function toggleDropdown(dropdownId, pillId) {
        const all = document.querySelectorAll(".filter-dropdown");
        const allPills = document.querySelectorAll(".filter-pill-btn");
        all.forEach((d) => {
          if (d.id !== dropdownId) d.classList.remove("open");
        });
        allPills.forEach((p) => {
          if (p.id !== pillId) p.classList.remove("open");
        });

        const dd = document.getElementById(dropdownId);
        const pill = document.getElementById(pillId);
        const isOpen = dd.classList.toggle("open");
        pill.classList.toggle("open", isOpen);
      }

      function applyAndCloseDropdown(dropdownId, pillId) {
        document.getElementById(dropdownId).classList.remove("open");
        document.getElementById(pillId).classList.remove("open");
        if (window.applyFilters) applyFilters("pill");
      }

      // Close dropdowns on outside click
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".filter-dropdown-wrap")) {
          document
            .querySelectorAll(".filter-dropdown")
            .forEach((d) => d.classList.remove("open"));
          document
            .querySelectorAll(".filter-pill-btn")
            .forEach((p) => p.classList.remove("open"));
        }
      });

      // ============ All Filters Drawer (mobile/tablet sidebar) ============
      function openAllFilters() {
        document.getElementById("all-filters-drawer").classList.add("open");
        document.getElementById("all-filters-overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeAllFilters() {
        document.getElementById("all-filters-drawer").classList.remove("open");
        document.getElementById("all-filters-overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      // Also trigger applyFilters when checkboxes inside the rating/category
      // pill dropdowns change directly (not just via Apply button)
      document.addEventListener("change", (e) => {
        if (
          e.target.matches(
            '.filter-dropdown input[type="checkbox"], .filter-dropdown input[type="number"]',
          )
        ) {
          applyFilters("pill");
        }
        if (e.target.closest("#all-filters-drawer")) {
          // live update inside drawer is fine but final apply happens on "Show results"
        }
      });
    </script>
  </body>
</html>
